<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Вгадай Мелодію - Debug Version</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f1e;
    --card: #13132a;
    --accent: #ff3cac;
    --accent2: #7b2fff;
    --accent3: #00e5ff;
    --gold: #ffd700;
    --text: #f0f0ff;
    --muted: #6b6b9a;
    --correct: #00ff9d;
    --wrong: #ff4444;
    --glow-pink: 0 0 30px rgba(255,60,172,0.5);
    --glow-blue: 0 0 30px rgba(0,229,255,0.4);
    --glow-purple: 0 0 40px rgba(123,47,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    display: flex; /* Додано для позиціонування дебагера */
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(123,47,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(255,60,172,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,229,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
  }

  .main-content {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 30px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.8s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: var(--glow-purple);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 14px 24px;
    margin-bottom: 28px;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent3);
  }
  .score-value.gold { color: var(--gold); }
  .score-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.08);
  }

  /* Round tracker */
  .round-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.4s ease;
  }
  .dot.active { background: var(--accent3); border-color: var(--accent3); box-shadow: 0 0 10px var(--accent3); }
  .dot.correct { background: var(--correct); border-color: var(--correct); box-shadow: 0 0 10px var(--correct); }
  .dot.wrong { background: var(--wrong); border-color: var(--wrong); box-shadow: 0 0 10px var(--wrong); }

  /* Main game card */
  .game-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
    opacity: 0.6;
  }

  /* Vinyl record */
  .vinyl-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .vinyl {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: conic-gradient(
      #1a1a2e 0deg 20deg, #16213e 20deg 40deg, #1a1a2e 40deg 60deg,
      #16213e 60deg 80deg, #1a1a2e 80deg 100deg, #16213e 100deg 120deg,
      #1a1a2e 120deg 140deg, #16213e 140deg 160deg, #1a1a2e 160deg 180deg,
      #16213e 180deg 200deg, #1a1a2e 200deg 220deg, #16213e 220deg 240deg,
      #1a1a2e 240deg 260deg, #16213e 260deg 280deg, #1a1a2e 280deg 300deg,
      #16213e 300deg 320deg, #1a1a2e 320deg 340deg, #16213e 340deg 360deg
    );
    box-shadow: 0 0 0 4px rgba(255,255,255,0.05), 0 0 40px rgba(123,47,255,0.3);
    position: relative;
    transition: box-shadow 0.3s;
  }
  .vinyl.spinning {
    animation: spin 2s linear infinite;
    box-shadow: 0 0 0 4px rgba(255,60,172,0.2), var(--glow-pink), var(--glow-purple);
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .vinyl-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent2) 0%, var(--accent) 100%);
    box-shadow: 0 0 20px rgba(255,60,172,0.6);
  }
  .vinyl-center::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--bg);
  }

  /* Status area */
  .status-area {
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .status-text {
    font-size: 16px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .question-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 300px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Wave visualizer */
  .wave-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 30px;
    margin-top: 10px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(to top, var(--accent2), var(--accent));
    animation: wave 0.8s ease-in-out infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .wave-wrap.active .wave-bar { opacity: 1; }
  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 24px; }
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.15s; }
  .wave-bar:nth-child(5) { animation-delay: 0.05s; }
  .wave-bar:nth-child(6) { animation-delay: 0.25s; }
  .wave-bar:nth-child(7) { animation-delay: 0.1s; }
  .wave-bar:nth-child(8) { animation-delay: 0.3s; }

  /* Play button */
  .play-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 36px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    box-shadow: var(--glow-purple);
    letter-spacing: 0.5px;
    margin-top: 12px;
  }
  .play-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 0 50px rgba(123,47,255,0.6); }
  .play-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Answer options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    line-height: 1.3;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option-btn:hover:not(:disabled)::before { opacity: 0.08; }
  .option-btn:hover:not(:disabled) {
    border-color: rgba(123,47,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .option-btn:disabled { cursor: not-allowed; }
  .option-btn.correct { background: rgba(0,255,157,0.1); border-color: var(--correct); color: var(--correct); }
  .option-btn.wrong { background: rgba(255,68,68,0.1); border-color: var(--wrong); color: var(--wrong); }
  .option-btn.revealed { background: rgba(0,255,157,0.05); border-color: rgba(0,255,157,0.3); color: var(--correct); opacity: 0.7; }

  .option-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--muted);
  }

  .option-name { display: block; font-size: 13px; font-weight: 700; }
  .option-artist { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  /* Result feedback */
  .feedback {
    text-align: center;
    padding: 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    margin-top: 16px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(0,255,157,0.1); border: 1px solid rgba(0,255,157,0.3); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: var(--wrong); }

  /* Next button */
  .next-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    margin-top: 14px;
    display: none;
  }
  .next-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* End screen */
  .end-screen { display: none; text-align: center; }
  .end-screen.show { display: block; }

  .end-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
  .end-title {
    font-size: 32px; font-weight: 800; margin-bottom: 8px;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .end-score-big { font-size: 64px; font-weight: 800; color: var(--gold); font-family: 'Space Mono', monospace; line-height: 1; margin: 16px 0; }
  .end-detail { color: var(--muted); font-size: 14px; font-family: 'Space Mono', monospace; margin-bottom: 32px; }

  /* Hidden YouTube iframe */
  #yt-player {
    position: absolute;
    width: 200px;
    height: 200px;
    opacity: 0.01;
    pointer-events: none;
    z-index: -100;
    top: 0;
  }

  /* Countdown overlay */
  .countdown-ring {
    position: relative;
    width: 60px; height: 60px;
    display: none;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
  }
  .countdown-ring.show { display: flex; }
  .countdown-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .countdown-ring circle { fill: none; stroke-width: 3; stroke-linecap: round; }
  .countdown-ring circle.bg { stroke: rgba(255,255,255,0.08); }
  .countdown-ring circle.progress { stroke: url(#grad); transition: stroke-dashoffset 0.1s linear; }
  .countdown-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent3); z-index: 1; }

  /* ========================================= */
  /* DEBUG PANEL STYLES                        */
  /* ========================================= */
  .debug-panel {
    width: 320px;
    background: #0b0b14;
    border-left: 2px solid var(--accent);
    padding: 20px;
    overflow-y: auto;
    max-height: 100vh;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    position: relative;
    z-index: 50;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  }

  .debug-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }

  .debug-header h3 {
    color: var(--accent3);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    margin: 0;
  }

  .debug-clear {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    cursor: pointer;
  }

  .debug-clear:hover { background: rgba(255,255,255,0.1); color: white; }

  .log-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-entry {
    background: rgba(255,255,255,0.03);
    padding: 8px;
    border-radius: 6px;
    word-break: break-word;
    border-left: 3px solid transparent;
  }

  .log-time { color: var(--muted); font-size: 10px; display: block; margin-bottom: 2px; }
  .log-info { border-color: var(--accent3); color: #e0e0ff; }
  .log-success { border-color: var(--correct); color: var(--correct); }
  .log-warn { border-color: var(--gold); color: var(--gold); }
  .log-error { border-color: var(--wrong); color: var(--wrong); background: rgba(255,68,68,0.1); font-weight: bold; }

  @media (max-width: 1000px) {
    body { flex-direction: column; }
    .debug-panel {
      width: 100%;
      height: 250px;
      border-left: none;
      border-top: 2px solid var(--accent);
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
    .options-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div id="yt-player"></div>

<div class="main-content">
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <h1>Вгадай Мелодію</h1>
      </div>
      <p class="subtitle">Guess The Beat · Music Quiz</p>
    </div>

    <div class="score-bar">
      <div class="score-item"><span class="score-label">Раунд</span><span class="score-value" id="round-display">1 / 5</span></div>
      <div class="score-divider"></div>
      <div class="score-item"><span class="score-label">Правильно</span><span class="score-value gold" id="correct-display">0</span></div>
      <div class="score-divider"></div>
      <div class="score-item"><span class="score-label">Очки</span><span class="score-value" id="score-display">0</span></div>
    </div>

    <div class="round-dots" id="round-dots">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="game-card" id="game-area">
      <div class="vinyl-wrap">
        <div class="vinyl" id="vinyl"><div class="vinyl-center"></div></div>
      </div>

      <div class="status-area" id="status-area">
        <p class="question-label">Хто виконує цю пісню?</p>
        <p class="status-text" id="status-text">Ініціалізація...</p>

        <div class="wave-wrap" id="wave">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>

        <div class="progress-wrap" id="prog-wrap" style="display:none"><div class="progress-fill" id="prog-fill"></div></div>

        <div class="countdown-ring" id="countdown-ring">
          <svg width="60" height="60" viewBox="0 0 60 60">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#7b2fff"/>
                <stop offset="100%" style="stop-color:#ff3cac"/>
              </linearGradient>
            </defs>
            <circle class="bg" cx="30" cy="30" r="26"/>
            <circle class="progress" id="countdown-circle" cx="30" cy="30" r="26" stroke-dasharray="163.4" stroke-dashoffset="0"/>
          </svg>
          <span class="countdown-num" id="countdown-num">5</span>
        </div>

        <button class="play-btn" id="play-btn" onclick="playSnippet()" disabled>
          ▶ Слухати фрагмент
        </button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <button class="next-btn" id="next-btn" onclick="nextRound()">Наступний раунд →</button>

    <div class="end-screen" id="end-screen">
      <span class="end-emoji" id="end-emoji">🎉</span>
      <div class="end-title" id="end-title">Чудова гра!</div>
      <div class="end-score-big" id="end-score-big">0</div>
      <div class="end-detail" id="end-detail">0 з 5 правильних відповідей</div>
      <button class="restart-btn" onclick="restartGame()">🔄 Грати знову</button>
    </div>
  </div>
</div>

<div class="debug-panel">
  <div class="debug-header">
    <h3>Відлагодження (Logs)</h3>
    <button class="debug-clear" onclick="document.getElementById('log-container').innerHTML=''">Очистити</button>
  </div>
  <div class="log-container" id="log-container">
    </div>
</div>

<script>
// ==============================
// DEBUG LOGGER
// ==============================
function logDebug(message, type = 'info') {
  const container = document.getElementById('log-container');
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}.${now.getMilliseconds().toString().padStart(3, '0')}`;

  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  entry.innerHTML = `<span class="log-time">[${timeStr}]</span>${message}`;

  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
  console.log(`[${type.toUpperCase()}] ${message}`);
}

window.onload = () => {
  logDebug(`Завантаження сторінки. Протокол: ${window.location.protocol}`, 'info');
  if (window.location.protocol === 'file:') {
    logDebug('КРИТИЧНА ПОМИЛКА: Файл відкрито локально (file://). YouTube блокує відтворення через політику безпеки. Використовуйте локальний сервер (напр. Live Server).', 'error');
  }
};

// ==============================
// SONG DATABASE
// ==============================
const SONGS = [
  { id: 'dQw4w9WgXcQ', name: 'Never Gonna Give You Up', artist: 'Rick Astley' },
  { id: 'JGwWNGJdvx8', name: 'Shape of You', artist: 'Ed Sheeran' },
  { id: 'kXYiU_JCYtU', name: 'Numb', artist: 'Linkin Park' },
  { id: 'fJ9rUzIMcZQ', name: 'Bohemian Rhapsody', artist: 'Queen' },
  { id: 'OPf0YbXqDm0', name: 'Mark Ronson — Uptown Funk', artist: 'Bruno Mars' },
  { id: '7wtfhZwyrcc', name: 'Despacito', artist: 'Luis Fonsi' },
  { id: 'e-ORhEE9VVg', name: 'Blinding Lights', artist: 'The Weeknd' }
];

let player = null;
let currentSong = null;
let usedSongs = [];
let currentRound = 0;
let totalRounds = 5;
let score = 0;
let correctCount = 0;
let isPlaying = false;
let playbackTimer = null;
let countdownInterval = null;
let answered = false;
let playbackStart = 0;
let snippetDuration = 5000;
let canPlay = false;

function createParticles() {
  const wrap = document.getElementById('particles');
  const colors = ['#ff3cac', '#7b2fff', '#00e5ff', '#ffd700'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    p.style.opacity = 0.3 + Math.random() * 0.4;
    wrap.appendChild(p);
  }
}

// ==============================
// YOUTUBE Iframe API
// ==============================
function loadYTApi() {
  logDebug('Підключення скрипта YouTube Iframe API...', 'info');
  if (window.YT) { initPlayer(); return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  tag.onerror = () => logDebug('Помилка завантаження скрипта YouTube. Можливо, блокувальник реклами втрутився.', 'error');
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  logDebug('YouTube API готовий до ініціалізації плеєра.', 'success');
  initPlayer();
};

function initPlayer() {
  const wrap = document.getElementById('yt-player');
  const iframe = document.createElement('div');
  iframe.id = 'yt-iframe';
  wrap.appendChild(iframe);

  logDebug('Створення екземпляра YT.Player...', 'info');
  player = new YT.Player('yt-iframe', {
    width: '200',
    height: '200',
    videoId: SONGS[0].id,
    playerVars: {
      autoplay: 0,
      controls: 0,
      disablekb: 1,
      enablejsapi: 1,
      origin: window.location.origin
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onStateChange,
      onError: onPlayerError
    }
  });
}

function onPlayerReady() {
  logDebug('Плеєр успішно завантажено та готовий.', 'success');
  canPlay = true;
  document.getElementById('play-btn').disabled = false;
  document.getElementById('status-text').textContent = 'Натисни кнопку, щоб почути фрагмент';
  startRound();
}

function onStateChange(event) {
  const states = {
    '-1': 'Не розпочато (Unstarted)',
    '0': 'Закінчено (Ended)',
    '1': 'Відтворення (Playing)',
    '2': 'Пауза (Paused)',
    '3': 'Буферизація (Buffering)',
    '5': 'Відео в черзі (Video Cued)'
  };
  logDebug(`Зміна стану: ${states[event.data]} [Код: ${event.data}]`, 'info');

  // Якщо відео почало грати (1), і ми чекали на це
  if (event.data === 1 && isPlaying) {
      logDebug('▶ Аудіо пішло...', 'success');
  }
}

function onPlayerError(event) {
  const errors = {
    '2': 'Недійсний параметр відео (ID помилковий)',
    '5': 'Помилка HTML5 плеєра',
    '100': 'Відео не знайдено (видалено або приховано)',
    '101': 'Власник заборонив відтворення у вбудованих плеєрах (Embed Restricted)',
    '150': 'Власник заборонив відтворення у вбудованих плеєрах (Embed Restricted)'
  };
  logDebug(`ПОМИЛКА ПЛЕЄРА: ${errors[event.data] || 'Невідома'} [Код: ${event.data}]`, 'error');

  // Прибираємо анімації, якщо сталась помилка
  stopPlayback(true);
  document.getElementById('status-text').textContent = 'Помилка завантаження аудіо!';
}

// ==============================
// GAME LOGIC
// ==============================
function getRandomSong(exclude = []) {
  const available = SONGS.filter(s => !exclude.includes(s.id));
  return available[Math.floor(Math.random() * available.length)];
}

function getWrongOptions(correct, count = 3) {
  const pool = SONGS.filter(s => s.id !== correct.id);
  return pool.sort(() => Math.random() - 0.5).slice(0, count);
}

function startRound() {
  answered = false;
  isPlaying = false;
  clearTimers();

  currentSong = getRandomSong(usedSongs);
  usedSongs.push(currentSong.id);

  logDebug(`--- РАУНД ${currentRound + 1} ---`, 'warn');
  logDebug(`Підготовка пісні: ${currentSong.name} (${currentSong.id})`, 'info');

  document.getElementById('round-display').textContent = `${currentRound + 1} / ${totalRounds}`;
  document.getElementById('vinyl').classList.remove('spinning');
  document.getElementById('status-text').textContent = 'Натисни кнопку, щоб почути фрагмент';
  document.getElementById('prog-wrap').style.display = 'none';
  document.getElementById('wave').classList.remove('active');
  document.getElementById('countdown-ring').classList.remove('show');

  if (canPlay) document.getElementById('play-btn').disabled = false;
  document.getElementById('play-btn').style.display = 'inline-flex';
  document.getElementById('play-btn').textContent = '▶ Слухати фрагмент';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';

  const wrongs = getWrongOptions(currentSong, 3);
  const allOptions = [currentSong, ...wrongs].sort(() => Math.random() - 0.5);
  const letters = ['A', 'B', 'C', 'D'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';

  allOptions.forEach((song, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-name">${song.name}</span><span class="option-artist">${song.artist}</span>`;
    btn.onclick = () => checkAnswer(song, btn);
    grid.appendChild(btn);
  });

  if (player && player.cueVideoById) {
    playbackStart = 20 + Math.floor(Math.random() * 40); // 20-60 sec
    logDebug(`Завантаження в пам'ять (cue) з ${playbackStart} сек...`, 'info');
    player.cueVideoById({ videoId: currentSong.id, startSeconds: playbackStart });
  }
}

function playSnippet() {
  if (isPlaying || answered || !canPlay) return;
  isPlaying = true;

  logDebug(`Натиснуто "Слухати". Команда player.playVideo()...`, 'warn');

  document.getElementById('play-btn').disabled = true;
  document.getElementById('play-btn').style.display = 'none';
  document.getElementById('vinyl').classList.add('spinning');
  document.getElementById('wave').classList.add('active');
  document.getElementById('status-text').textContent = '🎵 Слухаєш...';
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('countdown-ring').classList.add('show');

  if (player && player.seekTo) {
    player.seekTo(playbackStart, true);
    player.playVideo();
  } else {
    logDebug('Помилка: обєкт player не має методів playVideo/seekTo.', 'error');
  }

  const start = Date.now();
  const circle = document.getElementById('countdown-circle');
  const numEl = document.getElementById('countdown-num');
  const fillEl = document.getElementById('prog-fill');

  countdownInterval = setInterval(() => {
    const elapsed = Date.now() - start;
    const remaining = Math.max(0, snippetDuration - elapsed);

    numEl.textContent = Math.ceil(remaining / 1000);
    circle.style.strokeDashoffset = 163.4 * (elapsed / snippetDuration);
    fillEl.style.width = ((elapsed / snippetDuration) * 100) + '%';

    if (elapsed >= snippetDuration) {
      logDebug('Час вичерпано. Зупинка...', 'info');
      stopPlayback();
    }
  }, 50);

  playbackTimer = setTimeout(stopPlayback, snippetDuration);
}

function stopPlayback(isError = false) {
  clearTimers();
  isPlaying = false;

  if (player && player.pauseVideo) player.pauseVideo();

  document.getElementById('vinyl').classList.remove('spinning');
  document.getElementById('wave').classList.remove('active');
  document.getElementById('countdown-ring').classList.remove('show');
  document.getElementById('prog-wrap').style.display = 'none';

  if (!answered && !isError) {
    document.getElementById('status-text').textContent = 'Обери правильну відповідь!';
    document.getElementById('play-btn').disabled = false;
    document.getElementById('play-btn').style.display = 'inline-flex';
    document.getElementById('play-btn').textContent = '🔁 Слухати ще раз';
  }
}

function clearTimers() {
  if (playbackTimer) clearTimeout(playbackTimer);
  if (countdownInterval) clearInterval(countdownInterval);
}

function checkAnswer(song, btn) {
  if (answered) return;
  answered = true;
  logDebug(`Обрано варіант: ${song.name}`, 'info');
  stopPlayback();

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const isCorrect = song.id === currentSong.id;
  const feedback = document.getElementById('feedback');

  if (isCorrect) {
    logDebug('Відповідь ПРАВИЛЬНА.', 'success');
    btn.classList.add('correct');
    score += 100;
    correctCount++;
    feedback.textContent = '🎉 Правильно! +100 очків';
    feedback.className = 'feedback correct-fb show';
  } else {
    logDebug('Відповідь НЕПРАВИЛЬНА.', 'error');
    btn.classList.add('wrong');
    feedback.className = 'feedback wrong-fb show';
    feedback.textContent = `❌ Це було: ${currentSong.name}`;
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.querySelector('.option-name').textContent === currentSong.name) b.classList.add('revealed');
    });
  }

  document.getElementById('correct-display').textContent = correctCount;
  document.getElementById('score-display').textContent = score;
  document.getElementById('next-btn').className = 'next-btn show';
  document.getElementById('next-btn').textContent = currentRound < totalRounds - 1 ? 'Наступний раунд →' : 'Результати 🏆';
}

function nextRound() {
  currentRound++;
  if (currentRound >= totalRounds) {
    logDebug('Кінець гри.', 'info');
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('options-grid').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('end-screen').className = 'end-screen show';
    document.getElementById('end-score-big').textContent = score;
    document.getElementById('end-detail').textContent = `${correctCount} з ${totalRounds} правильних`;
  } else {
    startRound();
  }
}

createParticles();
loadYTApi();
</script>
</body>
