<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ksyu ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap');

        html, body {
            margin: 0; padding: 0; background-color: #000; overflow: hidden;
            width: 100%; height: 100vh; height: 100dvh;
            position: fixed; top: 0; left: 0;
        }

        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier New', monospace;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        #matrix-rotator {
            position: absolute; top: 0; left: 0;
            z-index: 1; transition: transform 3s ease-in-out, opacity 2s;
        }
        canvas { display: block; }

        #content-wrapper {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; pointer-events: none;
        }

        #message-container {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 4vw, 4.5rem); text-align: center;
            max-width: 90%; font-weight: 900;
            text-transform: uppercase; line-height: 1.2; margin-bottom: 40px;
            transition: color 0.1s, text-shadow 0.1s;
            min-height: 2em;
        }

        .key-word { color: #ff0000 !important; text-shadow: 0 0 20px #ff0000 !important; }
        .key-word-secret { color: #fff !important; text-shadow: 0 0 15px #9d00ff, 0 0 30px #9d00ff !important; }

        .key-word-gradient {
            background: linear-gradient(90deg, #FF0150, #FF007B, #FF01C1);
            background-size: 200% auto;
            color: transparent !important;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientShift 3s linear infinite;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(255,20,147,0.7));
        }

        @keyframes gradientShift {
            to { background-position: 200% center; }
        }

        .strike { text-decoration: line-through; color: #777 !important; text-shadow: none !important; }

        .word-cascade-wrap { display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 0.25em; }
        @keyframes wordCascadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes wordCascadeOut {
            from { opacity: 1; transform: translateY(0); }
            to   { opacity: 0; transform: translateY(-24px); }
        }
        .word-cascade-wrap .w {
            display: inline-block; opacity: 0; animation: wordCascadeIn 0.45s ease forwards;
        }
        .word-cascade-wrap .w.out {
            animation: wordCascadeOut 0.4s ease forwards !important;
        }

        .decode-wrap { display: inline-block; font-family: 'Montserrat', sans-serif; }

        .ui-panel { display: none; pointer-events: auto; margin-top: 20px; text-align: center; }

        .btn-base {
            padding: 15px 35px; font-size: 1.2rem;
            background: rgba(0,0,0,0.9); border: 2px solid #ff1493; cursor: pointer;
            border-radius: 5px; color: #ff1493; font-weight: bold; transition: 0.3s;
            margin: 10px; font-family: 'Courier New', monospace; text-transform: uppercase;
            pointer-events: auto;
        }
        .btn-base:hover { background: #ff1493; color: #000; box-shadow: 0 0 33px #ff1493; }

        @media (max-width: 500px) {
            .btn-base { padding: 10px 15px; font-size: 0.85rem; margin: 5px; }
            #quiz-panel { gap: 5px !important; width: 95vw; }
        }

        #game-canvas {
            display: none; position: absolute; z-index: 20;
            border: 3px solid #00ffff; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(1.5px);
            cursor: pointer; box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
            width: 70vw; height: 70vh; max-width: 700px; max-height: 900px;
        }

        #book-container {
            position: fixed; z-index: 10; display: none; justify-content: center; align-items: center;
            top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; font-family: 'Courier New', monospace;
        }
        #bk-stage { position: relative; width: min(96vw, 1240px); height: min(64vw, 840px); user-select: none; }
        #bk-inner { position: absolute; inset: 0; }
        .bk-gut {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 16px; transform: translateX(-50%);
            background: linear-gradient(to right,rgba(0,0,0,.65) 0%,rgba(0,0,0,.05) 50%,rgba(0,0,0,.65) 100%);
            z-index: 2; pointer-events: none;
        }
        #bk-pr-next { position: absolute; right: 0; top: 0; width: 50%; height: 100%; overflow: hidden; z-index: 2; }
        #bk-pl { position: absolute; left: 0; top: 0; width: 50%; height: 100%; overflow: hidden; cursor: pointer; z-index: 3; }
        #bk-prw { position: absolute; right: 0; top: 0; width: 50%; height: 100%; transform-origin: left center; transform-style: preserve-3d; cursor: pointer; z-index: 4; }
        .bk-pf, .bk-pb { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; }
        .bk-pb { transform: rotateY(180deg); }
        .bk-pc { width: 100%; height: 100%; background: #000d00; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .bk-pc img { position: absolute; top: 0; bottom: 0; left: 5%; right: 5%; width: 90%; height: 100%; object-fit: cover; z-index: 1; }
        .bk-cm { position: absolute; width: 13px; height: 13px; opacity: .7; pointer-events: none; z-index: 3; }
        .bk-tl { top: 7px; left: 7px; border-top: 2px solid #00ff41; border-left: 2px solid #00ff41; }
        .bk-tr { top: 7px; right: 7px; border-top: 2px solid #00ff41; border-right: 2px solid #00ff41; }
        .bk-bl { bottom: 7px; left: 7px; border-bottom: 2px solid #00ff41; border-left: 2px solid #00ff41; }
        .bk-br { bottom: 7px; right: 7px; border-bottom: 2px solid #00ff41; border-right: 2px solid #00ff41; }
        .bk-mc { position: absolute; font-family: 'Courier New',monospace; pointer-events: none; opacity: 0; animation: bk-fall linear infinite; }
        @keyframes bk-fall { 0%{opacity:0;transform:translateY(-10px)} 15%{opacity:.6} 85%{opacity:.25} 100%{opacity:0;transform:translateY(60px)} }
        .bk-sheen { position: absolute; top: 0; left: -90%; width: 55%; height: 100%; background: linear-gradient(to right,transparent,rgba(0,255,65,.2),transparent); transform: skewX(-12deg); z-index: 20; pointer-events: none; transition: left .72s ease; }
        .bk-sheen.go { left: 130%; }
        #bk-cover { position: absolute; inset: 0; z-index: 10; cursor: pointer; border-radius: 6px; border: 1px solid #00ff4133; }
        .bk-cvh { position: absolute; top: 0; height: 100%; background: #000d00; overflow: hidden; transition: transform .6s cubic-bezier(.4,0,.2,1); }
        #bk-cvL { left: 0; width: 50%; border-radius: 6px 0 0 6px; }
        #bk-cvR { left: 50%; width: 50%; border-radius: 0 6px 6px 0; }
        .bk-cmc { position: absolute; font-family: 'Courier New',monospace; pointer-events: none; opacity: 0; animation: bk-fall linear infinite; }
        #bk-cover-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; pointer-events: none; z-index: 11; }
        .bk-cover-title { font-size: clamp(12px,2.4vw,17px); font-weight: bold; color: #00ff41; text-align: center; letter-spacing: 2px; text-transform: uppercase; line-height: 1.5; margin-top: 8px; }
        #bk-cover-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: clamp(20px, 5vw, 26px); font-weight: bold; color: #00ff4199; white-space: nowrap; animation: bk-blink 1.5s infinite; z-index: 12; }
        @keyframes bk-blink { 0%,100%{opacity:.4} 50%{opacity:1} }
        #bk-counter { position: absolute; top: -22px; right: 0; font-size: 9px; color: #00ff4144; font-family: 'Courier New',monospace; }
        #bk-nav-l, #bk-nav-r { position: absolute; bottom: -22px; font-size: 9px; color: #ffffff18; font-family: 'Courier New',monospace; cursor: pointer; }
        #bk-nav-l { left: 0; } #bk-nav-r { right: 0; }

        #captcha-container, #password-container {
            display: none; position: absolute; z-index: 50;
            background: rgba(0,0,0,0.9); border: 2px solid #ff1493; border-radius: 10px;
            padding: 20px; text-align: center; color: #fff; pointer-events: auto; max-width: 90vw;
        }
        #password-container { border-color: #00ffff; }
        .captcha-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; max-width: 300px; margin-left: auto; margin-right: auto; }
        .captcha-item { width: 70px; height: 70px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; transition: transform 0.2s; position: relative; overflow: hidden; }
        .captcha-item.selected { transform: scale(0.96); border: 2px solid #ff1493; }
        .captcha-item.selected::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, #ff1493); animation: spin 1.5s linear infinite; }
        .captcha-item.selected::after { content: ''; position: absolute; inset: 3px; background: #222; border-radius: 5px; }
        .captcha-emoji { position: relative; z-index: 2; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #password-input {
            background: transparent; border: none; border-bottom: 2px solid #00ffff;
            color: #00ffff; font-size: 2rem; text-align: center; outline: none; margin: 20px 0;
            font-family: 'Courier New', monospace; width: 80%;
        }

        #fireworks-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: hidden; }
        .firework { position: absolute; font-size: 3rem; animation: explode 1s ease-out forwards; filter: drop-shadow(0 0 15px #fff); }
        @keyframes explode { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        #finale-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; opacity: 0; transition: opacity 1.5s ease; }
        #finale-canvas.visible { opacity: 1; }
        #final-btn-container { display: none; position: fixed; z-index: 200; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>

        function setTextWordCascade(container, html) {
            const temp = document.createElement('div'); temp.innerHTML = html;
            const wrap = document.createElement('span'); wrap.className = 'word-cascade-wrap';
            function processNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const parts = node.textContent.split(/(\s+)/);
                    parts.forEach(part => {
                        if (part.trim() === '') return;
                        const w = document.createElement('span'); w.className = 'w'; w.textContent = part; wrap.appendChild(w);
                    });
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    const w = document.createElement('span'); w.className = 'w'; w.appendChild(node.cloneNode(true)); wrap.appendChild(w);
                }
            }
            temp.childNodes.forEach(processNode);
            wrap.querySelectorAll('.w').forEach((w, i) => w.style.animationDelay = (i * 0.1) + 's');
            container.innerHTML = ''; container.appendChild(wrap);
        }

        const DECODE_CHARS = 'アイウエオカキクケコサシスセソ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
        let decodeInterval = null;
        function setTextDecode(container, html) {
            const temp = document.createElement('div'); temp.innerHTML = html;
            const plainText = temp.textContent;
            const wordTokens = plainText.split(/(\s+)/).map(t => ({ text: t, isSpace: /^\s+$/.test(t) }));
            const wordCount = wordTokens.filter(t => !t.isSpace).length;
            if (decodeInterval) clearInterval(decodeInterval);
            const span = document.createElement('span'); span.className = 'decode-wrap';
            container.innerHTML = ''; container.appendChild(span);
            const framesPerWord = 3;
            const totalFrames = wordCount * framesPerWord + 4; let iteration = 0;
            decodeInterval = setInterval(() => {
                const revealedWords = Math.floor(iteration / framesPerWord); let wi = 0;
                span.textContent = wordTokens.map(t => {
                    if (t.isSpace) return t.text;
                    const revealed = wi < revealedWords; wi++;
                    if (revealed) return t.text;
                    return t.text.split('').map(() => DECODE_CHARS[Math.floor(Math.random() * DECODE_CHARS.length)]).join('');
                }).join('');
                iteration++;
                if (iteration >= totalFrames) { clearInterval(decodeInterval); decodeInterval = null; span.innerHTML = html; }
            }, 20);
        }

        function formatText(text, isSecret) {
            let res = text.replace(/перекреслить/gi, '<span class="strike">перекреслить</span>');

            const secretNames = ['Ксенія', 'Ксюша', 'Ксю', 'Сергій', 'Тимур', 'Настя', 'Іра', 'Зизо', 'Абідат', 'Ілля', 'Наташа', 'Кіра', 'Ванш', 'Тімурів', '«Любімка»', 'Ксюбінатор', 'Анжелу', 'Олега', 'Денис', 'Юрчіком', 'Юрчик', 'Ярослав', 'Яною'];
            const goodWords = ['щастя', 'драйву', 'кайф', 'харизматичною', 'геній', 'дзену', 'зльоту', 'мрії', 'репетитор', 'Вільнюс', 'подарунки', 'сюрпризи', 'креативна', 'глибока', 'душевна', 'турботлива', 'найщасливішою', 'зірочка', 'ефектно', 'авантюри', 'першовідкривачі', 'яскравою', 'неповторною', 'енергійною', 'неперевершеною', 'красивою', 'щирості', 'вмінні'];

            if (isSecret) {
                secretNames.forEach(name => { res = res.replace(new RegExp(name, 'gi'), `<span class="key-word-secret">$&</span>`); });
            } else {
                secretNames.forEach(name => { res = res.replace(new RegExp(name, 'gi'), `<span class="key-word-gradient">$&</span>`); });
            }
            goodWords.forEach(word => { res = res.replace(new RegExp(word, 'gi'), `<span class="key-word-gradient">$&</span>`); });

            return res;
        }

            if(drops.length < columns) {

        function drawMatrix() {
            if (isGlobalPause) return;
            time += 0.05;

            if (activeAlbum === 2 && !isGrandFinaleParty) {
                matrixColorHue += 0.001;
            }
            if (isGrandFinaleParty) {
                matrixColorHue += 0.015;
            } else if (isGameRunning) {
                currentAngle -= CONFIG.matrixRotationSpeed;
                matrixColorHue += CONFIG.matrixColorSpeed;
                rotator.style.transform = `rotate(${currentAngle}deg)`;
            } else if (isGrandFinaleSpin) {
                matrixColorHue += 0.005;
                currentAngle -= 2;
                rotator.style.transform = `rotate(${currentAngle}deg)`;
            }

            ctx1.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx1.fillRect(0, 0, canvas1.width, canvas1.height); ctx1.font = `bold 18px monospace`;

            const h1 = (328 + (matrixColorHue * 360)) % 360;
            const h2 = (348 + (matrixColorHue * 360)) % 360;
            const currentMatrixColor = `hsl(${h1}, 100%, 54%)`;
            const currentMatrixShadow = `hsl(${h2}, 83%, 47%)`;

            if (activeAlbum === 2 || isGrandFinaleParty || isGrandFinaleSpin) {
                msgContainer.style.color = currentMatrixColor;
                msgContainer.style.textShadow = `0 0 16px ${currentMatrixColor}, 0 0 40px ${currentMatrixShadow}`;
            } else {
                msgContainer.style.color = '#ff1493';
                msgContainer.style.textShadow = '0 0 16px #ff1493, 0 0 40px #ff0000';
            }

            for (let i = 0; i < drops.length; i++) {
                const isUA = (i % 3 === 0); const phrase = isUA ? phraseUA : phraseEN;
                const text = phrase[charIndices[i] % phrase.length];
                const x = i * 18; const y = drops[i] * 18;
                const diag = (x + y) / (canvas1.width + canvas1.height) + Math.sin(time * 0.5) * 0.1;
                ctx1.fillStyle = diag < 0.65 ? currentMatrixColor : currentMatrixShadow;
                ctx1.fillText(text, x, y);
                if (!stopMatrixSpawning && y > canvas1.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++; charIndices[i]++;
            }
            if (isScrolling) {
                offsetScrollY -= 1; ctx2.clearRect(0, 0, canvas2.width, canvas2.height); ctx2.drawImage(canvas1, 0, 0);
                canvas1.style.transform = `translateY(${offsetScrollY}px)`; canvas2.style.transform = `translateY(${offsetScrollY}px)`;
                if (Math.abs(offsetScrollY) >= canvas1.height) offsetScrollY = 0;
            }
        }

                const pool = [
                    { type: 'w', emj: '👩' }, { type: 'w', emj: '👩🏼' }, { type: 'w', emj: '👩🏻' }, { type: 'w', emj: '👩🏽' }, { type: 'w', emj: '👩🏾' },
                    { type: 'm', emj: '👨' }, { type: 'm', emj: '👨🏼' }, { type: 'm', emj: '👨🏻' }, { type: 'm', emj: '👨🏽' }
                ];
                shuffle(pool);
                pool.forEach((item, idx) => {
                    const div = document.createElement('div'); div.className = 'captcha-item'; div.innerHTML = `<span class="captcha-emoji">${item.emj}</span>`;
                    if (item.type === 'm') correctIndices.add(idx);
                    div.onclick = () => {
                        sendTG(`Капча: клік на емодзі ${item.emj}`);
                        if (selectedCaptcha.has(idx)) { selectedCaptcha.delete(idx); div.classList.remove('selected'); }
                        else { selectedCaptcha.add(idx); div.classList.add('selected'); }
                    };
                    grid.appendChild(div);
                });
                container.style.display = 'block';
            });
        }

        function verifyCaptcha() {
            sendTG("Натиснуто: Підтвердити (капча)");
            let isCorrect = (selectedCaptcha.size === correctIndices.size);
            for (let index of selectedCaptcha) { if (!correctIndices.has(index)) { isCorrect = false; break; } }
            if (isCorrect) {
                sendTG("Капча успішно пройдена!");
                document.getElementById('captcha-container').style.display = 'none'; captchaResolve();
            } else {
                sendTG("Помилка капчі.");
                document.getElementById('captcha-error').style.display = 'block';
            }
        }

        let passwordResolve = null; let wrongPassAttempts = 0;
        function showPasswordPrompt() {
            return new Promise(resolve => {
                sendTG("Відкрито введення пароля.");
                passwordResolve = resolve; wrongPassAttempts = 0;
                const input = document.getElementById('password-input'); input.value = '';
                document.getElementById('password-error').style.display = 'none'; document.getElementById('password-hint').style.display = 'none';
                document.getElementById('hint-btn').style.display = 'none'; document.getElementById('password-container').style.display = 'block';
                input.focus();
            });
        }

        function showHint() { sendTG("Взято підказку для пароля"); document.getElementById('password-hint').style.display = 'block'; }

        function checkPasswordManual() {
            const inputEl = document.getElementById('password-input');
            const val = inputEl.value.trim().toLowerCase();
            if (val === '051-19-1') {
                sendTG("Пароль успішно введено: 051-19-1"); inputEl.blur(); setTimeout(() => window.scrollTo(0, 0), 100);
                document.getElementById('password-container').style.display = 'none';
                if (passwordResolve) { passwordResolve(); passwordResolve = null; }
            } else {
                wrongPassAttempts++; sendTG(`Невдала спроба пароля: ${val}`); inputEl.value = '';
                const err = document.getElementById('password-error'); err.textContent = 'ні ні спробуй ще'; err.style.display = 'block';
                if (wrongPassAttempts >= 2) { document.getElementById('hint-btn').style.display = 'inline-block'; }
                setTimeout(() => { err.style.display = 'none'; }, 2000);
            }
        }

        async function startPostAlbum1Phase() { await playPostAlbumTexts(postAlbum1Texts, false); }
        async function startPostAlbum2Phase() { await playPostAlbumTexts(postAlbum2Texts, true); }

        async function playPostAlbumTexts(textArray, isSecret) {
            rotator.style.opacity = "1"; msgContainer.innerHTML = '';

            const images = isSecret ? albumImages2 : albumImages1;
            let albumDoneResolve; const albumDone = new Promise(r => { albumDoneResolve = r; });
            bookClosedResolve = albumDoneResolve;
            buildBook(images, isSecret);
            await albumDone;
            await delay(1000);

            for (let i = 0; i < textArray.length; i++) {
                if (!isSecret && i === 3) await showCaptcha(); // Captcha runs BEFORE index 3
                if (isSecret && i === 6) await showPasswordPrompt(); // Password runs BEFORE index 6

                const html = formatText(textArray[i], isSecret);
                setMessageText(msgContainer, html, isSecret);
                msgContainer.classList.add('show');

                if (i === textArray.length - 1) {
                    if (!isSecret) {
                        triggerGrandFinale(false); // Вихор
                        await delay(8000); await fadeOutContent(msgContainer); await delay(1000);
                        stopMatrixSpawning = true; finalBtnContainer.style.display = 'block';
                    } else {
                        await delay(Math.max(getDisplayTime(textArray[i]), 3000)); triggerGrandFinale(true); // Салюти
                        await delay(10000); await fadeOutContent(msgContainer); await delay(1000);
                        stopMatrixSpawning = true; finalBtnContainer.style.display = 'block';
                    }
                } else {
                    await delay(Math.max(getDisplayTime(textArray[i]), 2000));
                    msgContainer.classList.remove('show'); await fadeOutContent(msgContainer);
                }
            }
        }

        // ==========================================
        // ФІНАЛЬНА ГРА І ПІДВОДКА
        // ==========================================
        async function handleSecretLevel() {
            sendTG(`Опитування 2: обрано жду ссилки (Секретний рівень)`);
            document.getElementById('quiz-panel').style.display = 'none'; msgContainer.innerHTML = ''; activeAlbum = 2;
            audio2.volume = 0; audio2.play(); let vol = 1;
            let fadeInterval = setInterval(() => { vol -= 0.05; if (vol <= 0) { vol = 0; audio1.pause(); clearInterval(fadeInterval); } audio1.volume = vol; audio2.volume = 1 - vol; }, 100);
            currentAngle = -90; rotator.style.transition = 'transform 3s ease-in-out, opacity 2s'; rotator.style.transform = `rotate(${currentAngle}deg)`;
            let colorInterval = setInterval(() => { matrixColorHue += 0.02; if(matrixColorHue >= 0.6) { matrixColorHue = 0.6; clearInterval(colorInterval); } }, 50);
            await delay(1500);

            msgContainer.className = 'text-secret';

            const secretTexts = [
                "Ого, куди ми попали?",
                "Що ми тут накняпкали взагалі?",
                "Слухай, раз ми вже тут, то я підготував для тебе невеличкий подарунок — твою власну гру!",
                "Пролітай крізь нас усіх, через кожного друга, і долай будь-які перешкоди.",
                "Ти в нас найсміливіша і найкрутіша. Покажи клас! Погнали!"
            ];
            for (const t of secretTexts) {
                setTextDecode(msgContainer, formatText(t, true)); msgContainer.classList.add('show');
                if (t.includes("Погнали")) rotator.style.transition = "none";
                await delay(Math.max(getDisplayTime(t), 2000)); msgContainer.classList.remove('show'); await delay(1000);
            }
            startFlappyBird();
        }

        let bird, pipes, score, pipeTimer, gameFrames = 0;
        const enemyNames = ["Сергій", "Тимур", "Настя", "Іра", "Зизо", "Абідат", "Ілля", "Наташа", "Кіра", "Ванш"];

        function startFlappyBird() {
            gameCanvas.style.display = 'block';
            const d = CONFIG.difficulty;
            bird = { y: 450, velocity: 0, gravity: CONFIG.birdGravity * d, lift: CONFIG.birdLift * d };
            const effectivePipeSpeed = CONFIG.pipeSpeed * d; const effectivePipeSpawn = Math.round(CONFIG.pipeSpawnRate / d);
            pipes = []; score = 0; pipeTimer = 0; gameFrames = 0; isGameRunning = true;
            gameCanvas.onclick = () => { bird.velocity = bird.lift; };
            function gameStep() {
                if (!isGameRunning) return; requestAnimationFrame(gameStep); gameCtx.clearRect(0, 0, 700, 900); gameFrames++;
                bird.velocity += bird.gravity; bird.y += bird.velocity;
                gameCtx.fillStyle = "#ff1493"; gameCtx.font = "bold 35px Montserrat"; gameCtx.textAlign = "center"; gameCtx.fillText("КСЮ", 100, bird.y);
                if (bird.y > 900 || bird.y < 0) resetGame();
                if (gameFrames % 60 < 30) { gameCtx.fillStyle = "rgba(255,255,255,0.7)"; gameCtx.font = "bold 20px Montserrat"; gameCtx.fillText("Flappy Ксю: ТАПАЙ ПО ЕКРАНУ! 👆", 350, 850); }
                pipeTimer++;
                if (pipeTimer % effectivePipeSpawn === 0 && score + pipes.length < enemyNames.length) {
                    let gap = 300; let top = Math.random() * (550 - gap) + 120;
                    pipes.push({ x: 700, top: top, gap: gap, name: enemyNames[score + pipes.length] });
                }
                for (let i = pipes.length-1; i >= 0; i--) {
                    pipes[i].x -= effectivePipeSpeed;
                    gameCtx.fillStyle = "#ff00ff"; gameCtx.font = "bold 40px Montserrat"; gameCtx.shadowBlur = 10; gameCtx.shadowColor = "#ff00ff";
                    const chars = pipes[i].name.split('');
                    for(let j=0; j*40 < pipes[i].top; j++) gameCtx.fillText(chars[j % chars.length], pipes[i].x + 30, (j+1) * 40);
                    for(let j=0; pipes[i].top + pipes[i].gap + j*40 < 900; j++) gameCtx.fillText(chars[j % chars.length], pipes[i].x + 30, pipes[i].top + pipes[i].gap + (j+1) * 40);
                    gameCtx.shadowBlur = 0;
                    if (pipes[i].x < 130 && pipes[i].x > 60 && (bird.y - 20 < pipes[i].top || bird.y + 10 > pipes[i].top + pipes[i].gap)) resetGame();
                    if (pipes[i].x + 60 < 100 && !pipes[i].passed) { score++; pipes[i].passed = true; }
                    if (pipes[i].x < -100) pipes.splice(i, 1);
                }
                gameCtx.fillStyle = "#fff"; gameCtx.textAlign = "left"; gameCtx.fillText(`Рахунок: ${score}/10`, 30, 50);
                if (score >= 10) winGame();
            }
            requestAnimationFrame(gameStep);
        }
        function resetGame() { score = 0; bird.y = 450; bird.velocity = 0; pipes = []; pipeTimer = 0; }

        async function winGame() {
            sendTG("Гра Flappy Ксю пройдена!");
            isGameRunning = false; gameCanvas.style.display = 'none';
            msgIndex = messages.length; startPostAlbum2Phase();
        }

        // ==========================================
        // ГРАНДІОЗНІ ФІНАЛИ
        // ==========================================
        function triggerGrandFinale(isSecret) {
            isGrandFinaleSpin = false; isGrandFinaleParty = false;

            if (isSecret) {
                rotator.style.transition = "transform 4s cubic-bezier(0.4, 0, 0.2, 1)";
                rotator.style.transform = "rotate(720deg) scale(1.5)";
                isGrandFinaleParty = true;

                setInterval(() => {
                    for(let i = 0; i < 3; i++) {
                        const fw = document.createElement('div');
                        fw.className = 'firework';
                        fw.style.left = Math.random() * 100 + '%'; fw.style.top = Math.random() * 100 + '%';
                        const emojis = ['🎆', '🎇', '✨', '🎉', '🥳', '🍾', '🔥', '💖', '👑'];
                        fw.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                        fwContainer.appendChild(fw);
                        setTimeout(() => fw.remove(), 1200);
                    }
                }, 150);

            } else {
                rotator.style.transition = "none";
                isGrandFinaleSpin = true;

                setInterval(() => {
                    const fw = document.createElement('div');
                    fw.className = 'firework';
                    fw.style.left = Math.random() * 90 + '%'; fw.style.top = Math.random() * 90 + '%';
                    const emojis = ['🎆', '🎇', '✨', '🎉', '🥳', '🍾'];
                    fw.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    fwContainer.appendChild(fw);
                    setTimeout(() => fw.remove(), 1000);
                }, 300);
            }
        }

        function startSurprise() {
            try { document.getElementById('start-btn').style.display = 'none'; } catch(e){}
            try {
                let audio = document.getElementById('bg-music');
                if(audio) { let p = audio.play(); if(p !== undefined) p.catch(e => console.log(e)); }
            } catch(e){}
            sendTG("Код запущений! Ксю натиснула кнопку Летс Ксю!.");
            try { showNextMessage(); } catch(e) { console.log(e); }
        }

        requestAnimationFrame(animateMatrix);
        window.addEventListener('resize', () => {
            resizeCanvases();
            if (finaleCanvas && finaleCanvas.classList && finaleCanvas.classList.contains('visible')) {
                finaleCanvas.width = window.innerWidth; finaleCanvas.height = window.innerHeight;
            }
        });
    </script>
